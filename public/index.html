<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>APT2U Audio Processor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 40px;
    }
    #progressBox {
      margin-top: 20px;
      padding: 15px;
      background: #222;
      border-radius: 8px;
      display: none;
      white-space: pre-line;
    }
    button {
      padding: 12px 20px;
      border: none;
      background: #4CAF50;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    input {
      margin: 20px 0;
    }
  </style>
</head>
<body>

  <h1>APT2U Audio Processor</h1>
  <p>Upload MP4 files directly. They will be processed one at a time.</p>

  <input type="file" id="files" multiple accept="video/mp4">

  <br>
  <button id="processBtn">Process Files</button>

  <div id="progressBox"></div>

  <script>
    const progressBox = document.getElementById("progressBox");

    // Listen to SSE progress
    function startProgressStream() {
      const evtSource = new EventSource("/progress");
      evtSource.onmessage = (e) => {
        progressBox.style.display = "block";
        progressBox.textContent = e.data;

        if (e.data === "DONE") {
          evtSource.close();
        }
      };
    }

    document.getElementById("processBtn").onclick = async () => {
      const files = document.getElementById("files").files;

      if (!files.length) {
        alert("Please select MP4 files first.");
        return;
      }

      const formData = new FormData();
      for (const file of files) {
        formData.append("files", file);
      }

      startProgressStream();

      const response = await fetch("/process", {
        method: "POST",
        body: formData
      });

      if (!response.ok) {
        alert("Processing failed.");
        return;
      }

      const blob = await response.blob();
      const url = window.URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "apt2u_processed.zip";
      a.click();

      window.URL.revokeObjectURL(url);
    };
  </script>

</body>
</html>
