<!DOCTYPE html>
<html>
<head>
  <title>apt2u ZIP Processor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      padding: 40px;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 420px;
      text-align: center;
    }
    #console {
      background: #111;
      color: #0f0;
      padding: 10px;
      height: 180px;
      overflow-y: auto;
      margin-top: 20px;
      font-family: monospace;
      border-radius: 6px;
      text-align: left;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #4a6cff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #3a56d6;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>apt2u ZIP Processor</h2>

  <form id="uploadForm" enctype="multipart/form-data">
    <input type="file" name="zipfile" id="zipfile" accept=".zip" />
    <button type="submit">Upload ZIP & Process</button>
  </form>

  <p id="uploadStatus">Waiting for upload…</p>
  <p id="processStatus">Waiting for processing…</p>

  <div id="console"></div>
</div>

<script>
  const consoleBox = document.getElementById("console");
  const uploadStatus = document.getElementById("uploadStatus");
  const processStatus = document.getElementById("processStatus");

  function log(msg) {
    consoleBox.innerHTML += msg + "<br>";
    consoleBox.scrollTop = consoleBox.scrollHeight;
  }

  // SSE for server processing progress
  const evtSource = new EventSource("/progress");
  evtSource.onmessage = (e) => {
    const msg = e.data;
    log(msg);

    if (msg.startsWith("Processing")) {
      // Format: "Processing X of Y :: filename"
      const parts = msg.split(" :: ");
      const progressPart = parts[0];
      const fileName = parts[1] || "Unknown";

      const nums = progressPart.split(" ");
      const current = parseInt(nums[1]);
      const total = parseInt(nums[3]);
      const percent = (current / total) * 100;

      processStatus.innerHTML =
        `Processing: ${current} of ${total} (${percent.toFixed(1)}%)<br>` +
        `Current file: ${fileName}`;
    }

    if (msg === "DONE") {
      processStatus.textContent = "Processing complete!";
    }
  };

  // Upload handler with progress
  document.getElementById("uploadForm").onsubmit = async (e) => {
    e.preventDefault();

    const file = document.getElementById("zipfile").files[0];
    if (!file) {
      log("Please select a ZIP file.");
      return;
    }

    const formData = new FormData();
    formData.append("zipfile", file);

    log("Uploading ZIP…");

    const xhr = new XMLHttpRequest();
    xhr.open("POST", "/process", true);
    xhr.responseType = "blob";

    xhr.upload.onprogress = (event) => {
      if (event.lengthComputable) {
        const percent = (event.loaded / event.total) * 100;
        uploadStatus.textContent = `Uploading ZIP: ${percent.toFixed(1)}%`;
      }
    };

    xhr.onload = () => {
      if (xhr.status === 200) {
        uploadStatus.textContent = "Upload complete!";
        log("Download ready.");
        const blob = xhr.response;
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "apt2u_processed.zip";
        a.click();
      } else {
        log("Error processing ZIP.");
      }
    };

    xhr.send(formData);
  };
</script>

</body>
</html>
